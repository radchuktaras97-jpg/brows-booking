<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brows Oleksandra</title>

  <!-- ШРИФТ -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="top-bar">
  <div class="client-header">
    <img src="logo.png" class="client-logo">
  </div>

  <div class="logo-center">
    Oleksandra Andriivna
  </div>

  <div class="contacts-bottom">
    
    <a href="tel:+380678893907">
      <span class="icon">☎</span>
      +380678893907
    </a>

    <a href="https://instagram.com/alexandra_b08" target="_blank">
      <span class="icon">⧉</span>
      Instagram
    </a>

    <a href="https://t.me/alexsandra_070921" target="_blank">
      <span class="icon">✈</span>
      Telegram
    </a>

  </div>

</header>

<!-- CATEGORY -->
<div class="services lux-card" id="categories">

  <h2 class="lux-title">Виберіть категорію</h2>

  <div class="category-card" onclick="openBrows()">
      <img src="brows.png" alt="Брови">
  </div>

  <div class="category-card" onclick="openLashes()">
      <img src="lashes.png" alt="Вії">
  </div>

</div>

<!-- SERVICES -->
<div class="services lux-card" id="services" style="display:none;">

  <button class="back-btn top-back" onclick="backToCategories()">
      ← Назад
  </button>

  <h2 class="lux-title">Оберіть послугу</h2>

  <div id="servicesList"></div>

</div>

<!-- LASHES -->
<!-- LASHES -->
<div class="services lux-card" id="lashes" style="display:none;">

    <button class="back-btn top-back" onclick="backToCategories()">
        ← Назад
    </button>

    <h2 class="lux-title">Оберіть послугу</h2>

    <div id="lashesList"></div>

</div>

<!-- CALENDAR -->
<div class="date lux-card" id="dateBlock" style="display:none;">
  <div class="calendar-header">
    <button class="back-btn" onclick="backToServices()">Назад</button>
    <button onclick="prevMonth()">‹</button>
    <div id="monthLabel"></div>
    <button onclick="nextMonth()">›</button>
  </div>

  <div class="calendar-days" id="calendarDays"></div>
</div>
 
<!-- TIME -->
<div class="time lux-card" id="timeBlock" style="display:none;">

  <div class="time-header">
    <button class="back-btn" onclick="backToCalendar()">Назад</button>
    <h2 class="lux-title">Оберіть час</h2>
  </div>

  <button onclick="selectTimeAndNext('08:00')">08:00</button>
  <button onclick="selectTimeAndNext('09:00')">09:00</button>
  <button onclick="selectTimeAndNext('10:00')">10:00</button>
  <button onclick="selectTimeAndNext('11:00')">11:00</button>
  <button onclick="selectTimeAndNext('12:00')">12:00</button>
  <button onclick="selectTimeAndNext('13:00')">13:00</button>
  <button onclick="selectTimeAndNext('14:00')">14:00</button>
  <button onclick="selectTimeAndNext('15:00')">15:00</button>
  <button onclick="selectTimeAndNext('16:00')">16:00</button>
  <button onclick="selectTimeAndNext('17:00')">17:00</button>
  <button onclick="selectTimeAndNext('18:00')">18:00</button>
  <button onclick="selectTimeAndNext('19:30')">19:30</button>
  <button onclick="selectTimeAndNext('20:30')">20:30</button>
  <button onclick="selectTimeAndNext('21:30')">21:30</button>
  <button onclick="selectTimeAndNext('22:30')">22:30</button>
</div>

<!-- USER -->
<div class="user lux-card" id="userBlock" style="display:none;">
  <div class="user-header">
    <button class="back-btn" onclick="backToTime()">Назад</button>
    <h2 class="lux-title">Ваші дані</h2>
  </div>

  <input id="name" placeholder="Ваше ім’я">
  <input id="phone" placeholder="Ваш телефон">

  <button onclick="confirmBooking()">Підтвердити запис</button>
</div>

<!-- SUCCESS -->
<div class="success lux-card" id="successBlock" style="display:none;">
  <h2 class="lux-title">✔️ Запис підтверджено</h2>

  <p id="successText"></p>

  <button id="wishBtn" onclick="showWish()">✨ Побажання дня</button>
  <div id="wishText" style="display:none;"></div>

  <button onclick="location.reload()" id="homeBtn" style="display:none;">
    На головну
  </button>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
